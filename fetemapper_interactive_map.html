            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color: ${typeColors[event.type]}; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);">•</div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });

            const marker = L.marker([event.lat, event.lng], {icon}).addTo(map);

            const popupContent = `
                <div class="popup-content">
                    <div class="popup-title">${event.name}</div>
                    <div class="popup-section">
                        <div class="popup-label">📍 Venue</div>
                        <div class="popup-value">${event.venue}</div>
                    </div>
                    <div class="popup-section">
                        <div class="popup-label">📅 Date & Time</div>
                        <div class="popup-value">${event.date || 'TBA'} @ ${event.time || 'TBA'}</div>
                    </div>
                    <div class="popup-section">
                        <div class="popup-label">🎵 Genres</div>
                        <div class="popup-value">${event.genres.join(', ')}</div>
                    </div>
                    ${event.status ? `<div class="popup-value" style="margin-top: 8px;"><strong>${event.status}</strong></div>` : ''}
                    <div class="popup-section">
                        <a href="https://fetemapper.com/EventDetail?id=${event.id}" class="popup-link" target="_blank">View Event Details →</a>
                    </div>
                </div>
            `;

            marker.bindPopup(popupContent);

            marker.on('click', function() {
                highlightEventItem(event.id);
            });

            return marker;
        }

        function renderEventList(eventsToRender) {
            const listContainer = document.getElementById('eventList');
            listContainer.innerHTML = '';

            eventsToRender.forEach((event, idx) => {
                const eventEl = document.createElement('div');
                eventEl.className = 'event-item';
                eventEl.id = `event-${event.id}`;

                const statusHTML = event.status ? `<div class="status-badge ${event.status.toLowerCase().includes('free') ? 'free' : event.status.toLowerCase().includes('coming') ? 'coming' : ''}">${event.status}</div>` : '';

                eventEl.innerHTML = `
                    <div class="event-name">${event.name}</div>
                    <div class="event-meta">
                        <span class="event-type ${event.type}">${event.type.toUpperCase()}</span>
                        <span style="color: #999;">•</span>
                        <span style="color: #666;">${event.date.split(' ')[1] || ''} ${event.date.split(' ')[2] || ''}</span>
                    </div>
                    <div style="font-size: 11px; color: #777; margin-top: 4px;">📍 ${event.venue}</div>
                    ${statusHTML}
                `;

                eventEl.addEventListener('click', () => {
                    highlightEventItem(event.id);
                    if (markers[event.id]) {
                        map.setView([event.lat, event.lng], 14);
                        markers[event.id].openPopup();
                    }
                });

                listContainer.appendChild(eventEl);
            });
        }

        function highlightEventItem(eventId) {
            document.querySelectorAll('.event-item').forEach(el => {
                el.classList.remove('active');
            });
            const el = document.getElementById(`event-${eventId}`);
            if (el) el.classList.add('active');
        }

        function filterEvents() {
            if (currentFilter === 'all') {
                filteredEvents = [...events];
            } else {
                filteredEvents = events.filter(e => e.type === currentFilter);
            }

            // Update markers visibility
            Object.keys(markers).forEach(id => {
                const event = events.find(e => e.id === id);
                const shouldShow = currentFilter === 'all' || event.type === currentFilter;
                if (shouldShow) {
                    map.addLayer(markers[id]);
                } else {
                    map.removeLayer(markers[id]);
                }
            });

            renderEventList(filteredEvents);
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const searched = filteredEvents.filter(event =>
                event.name.toLowerCase().includes(query) ||
                event.venue.toLowerCase().includes(query) ||
                event.genres.some(g => g.toLowerCase().includes(query))
            );
            renderEventList(searched);
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                filterEvents();
            });
        });

        // Initialize markers
        events.forEach(event => {
            markers[event.id] = createMarker(event);
        });

        // Initial render
        renderEventList(events);

    </script>
</body>
</html>
