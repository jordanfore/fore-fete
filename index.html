<style>
:root{
 --bg:#0A0A0A;--panel:#101010;--card:#161616;--line:#262626;
 --text:#FFFFFF;--muted:#8C8C8C;--accent:#FFD60A;
 --club:#FF2D6F;--day:#FF8A00;--street:#9D4EDD;--boat:#21C0E8;--food:#22B07D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

header{position:fixed;top:0;left:0;right:0;height:64px;z-index:1200;background:#0A0A0A;border-bottom:1px solid var(--line);
 display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.logo-link{display:flex;align-items:center;flex:none}
.logo{height:26px;width:auto;filter:invert(1);display:block}
.lockup{font-family:'Archivo';font-weight:900;font-size:21px;color:var(--accent);letter-spacing:-.5px;margin-left:-2px}
.brand .sub{color:var(--muted);font-size:11.5px;font-weight:500;display:none;white-space:nowrap}
@media(min-width:820px){.brand .sub{display:block}}
.hd-right{display:flex;align-items:center;gap:9px;flex:none}
.shop-pill{font-family:'Archivo';font-weight:800;font-size:11.5px;letter-spacing:.6px;border:1px solid var(--accent);color:var(--accent);padding:6px 11px;border-radius:999px;text-decoration:none;white-space:nowrap}
.shop-pill:hover{background:var(--accent);color:#000}
.count-pill{font-family:'Archivo';font-weight:800;font-size:12px;background:var(--accent);color:#000;padding:5px 10px;border-radius:999px}
/* footer */
.foot{border-top:1px solid var(--line);padding:11px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#0d0d0d;flex:none}
.foot-brand{display:flex;align-items:center;flex:none}
.foot-brand img{height:17px;filter:invert(1);opacity:.92}
.foot-links{display:flex;gap:13px;flex-wrap:wrap;justify-content:flex-end}
.foot-links a{font-size:12px;font-weight:600;color:var(--muted);text-decoration:none}
.foot-links a:hover{color:var(--accent)}

.app{position:fixed;top:64px;left:0;right:0;bottom:0;display:flex}
.panel{width:100%;display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--line);min-height:0}
.mapwrap{display:none;flex:1;position:relative}
#map{position:absolute;inset:0;background:#000}
@media(min-width:900px){.panel{width:440px;min-width:440px}.mapwrap{display:block}}

/* tab bar */
.tabs{display:flex;border-bottom:1px solid var(--line);background:#0d0d0d}
.tabs button{flex:1;padding:13px 6px;font-family:'Archivo';font-weight:800;font-size:12.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.tabs button.on{color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent)}
.tabs .b{font-size:10px;background:#222;color:#aaa;border-radius:999px;padding:1px 7px;margin-left:5px;vertical-align:middle}

.controls{padding:12px 14px 10px;border-bottom:1px solid var(--line);background:var(--panel)}
.search{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 13px}
.search:focus-within{border-color:var(--accent)}
.search svg{flex:none;opacity:.6}
.search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px}
.search input::placeholder{color:var(--muted)}
.filters{display:flex;gap:7px;overflow-x:auto;padding-top:10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
#filterWrap.hide{display:none}
.chip{flex:none;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--muted);white-space:nowrap;transition:.12s}
.chip[aria-pressed="true"]{background:var(--accent);color:#000;border-color:var(--accent)}
.chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.metarow{display:flex;align-items:center;justify-content:space-between;padding:9px 15px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}
.metarow button{font-size:12px;font-weight:600;color:var(--accent)}
.metarow.hide{display:none}

.list{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.day-h{position:sticky;top:0;z-index:5;background:#0d0d0d;border-bottom:1px solid var(--line);padding:9px 15px;
 font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--accent)}
.card{padding:14px 15px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s;position:relative}
.card:hover{background:#161616}
.card.active{background:#1b1a12;box-shadow:inset 3px 0 0 var(--accent)}
.card .top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:6px;color:#000}
.tag.club{background:var(--club);color:#fff}.tag.day{background:var(--day);color:#000}
.tag.street{background:var(--street);color:#fff}.tag.boat{background:var(--boat);color:#000}
.tag.event{background:#555;color:#fff}.tag.food{background:var(--food);color:#04231a}
.status{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:6px;border:1px solid var(--line)}
.status.free{color:#52E08A;border-color:#234}.status.sold{color:#FF5C7A;border-color:#412}
.status.tickets{color:var(--accent);border-color:#443}.status.coming{color:var(--muted)}
.card h3{font-family:'Archivo';font-weight:800;font-size:16.5px;line-height:1.2;margin-bottom:6px}
.meta{font-size:13px;color:var(--muted);line-height:1.5}
.meta b{color:#cfcfcf;font-weight:600}
.genres{margin-top:7px;font-size:11.5px;color:#777;line-height:1.4}
.actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.btn{font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:9px;display:inline-flex;align-items:center;gap:6px}
.btn.tix{background:var(--accent);color:#000}
.btn.tix.tbc{background:#222;color:var(--muted);border:1px solid var(--line)}
.btn.ghost{background:#1e1e1e;color:#ddd;border:1px solid var(--line)}
.dish{margin-top:9px;font-size:13px;color:#cfcfcf}.dish b{color:var(--food)}
.empty{padding:60px 24px;text-align:center;color:var(--muted)}
.empty b{display:block;font-family:'Archivo';font-weight:800;font-size:18px;color:#fff;margin-bottom:8px;text-transform:uppercase}

/* slang */
.lang-item{padding:13px 15px;border-bottom:1px solid var(--line)}
.lang-item .ctx{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);font-weight:700;margin-bottom:4px}
.lang-item .en{font-weight:600;font-size:15px}
.lang-item .fr{color:var(--accent);font-size:14.5px;margin:2px 0;font-weight:500}
.lang-item .us{color:var(--muted);font-size:12.5px;line-height:1.4}

.maptoggle{position:fixed;z-index:1300;bottom:22px;left:50%;transform:translateX(-50%);
 background:var(--accent);color:#000;font-family:'Archivo';font-weight:800;font-size:13px;letter-spacing:.5px;
 padding:13px 22px;border-radius:999px;box-shadow:0 8px 26px rgba(0,0,0,.5);text-transform:uppercase;display:flex;gap:8px;align-items:center}
@media(min-width:900px){.maptoggle{display:none}}
body.mapview .panel{display:none}
body.mapview .mapwrap{display:block}
@media(max-width:899px){.mapwrap{position:fixed;inset:64px 0 0 0;z-index:1100}.list{padding-bottom:86px}}

.leaflet-popup-content-wrapper{background:#161616;color:#fff;border-radius:12px;border:1px solid var(--line)}
.leaflet-popup-tip{background:#161616}
.leaflet-popup-content{margin:13px 15px;font-family:'Inter'}
.pop h4{font-family:'Archivo';font-weight:800;font-size:15px;margin-bottom:5px}
.pop .pm{font-size:12.5px;color:var(--muted);line-height:1.5}
.pop a.pbtn{display:inline-block;margin-top:9px;background:var(--accent);color:#000;font-weight:700;font-size:12px;padding:7px 12px;border-radius:8px;text-decoration:none}
.pop a.pbtn.tbc{background:#222;color:var(--muted)}
.leaflet-bar a{background:#161616;color:#fff;border-color:#333}
.leaflet-control-attribution{background:rgba(0,0,0,.5);color:#666}
.legend{position:absolute;bottom:14px;left:14px;z-index:1000;background:rgba(16,16,16,.92);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:11.5px}
.legend div{display:flex;align-items:center;gap:7px;margin:3px 0;color:#bbb}
.legend .d{width:10px;height:10px;border-radius:50%}
</style>
</head>

function chip(label,col,){const b=document.createElement('button');b.className='chip';b.setAttribute('aria-pressed','false');

 [19,20,21].forEach(d=>{const c=chip(DAYNAME[d]);c.onclick=()=>{toggle(state.days,d,c);render();};$('dayFilters').appendChild(c);});
 ["Free","Tickets","Sold Out","Coming Soon"].forEach(s=>{const c=chip(s);c.onclick=()=>{toggle(state.status,s,c);render();};$('statusFilters').appendChild(c);});

 if(state.status.size&&!state.status.has(e.status))return false;
 if(state.q){const q=state.q.toLowerCase();if(!((e.name+" "+e.venue+" "+e.genres+" "+e.arr+" "+e.address).toLowerCase().includes(q)))return false;}

}

 const b=tix?`<a class="pbtn" href="${tix}" target="_blank" rel="noopener">Tickets / RSVP →</a>`
   :(e.instagram?`<a class="pbtn tbc" href="${e.instagram}" target="_blank" rel="noopener">Follow for link ↗</a>`:"");
 return `<div class="pop"><h4>${esc(e.name)}</h4><div class="pm"><span class="tag ${e._slug}" style="font-size:9px">${esc(e.type)}</span> ${esc(e.status)}<br>${fmtTime(e.time_start)} · ${DAYNAME[e._day]}<br>${e.precision==="tbc"?"Location TBC":(esc(e.venue)+(e.address&&e.precision==="exact"?"<br>"+esc(e.address):""))}</div>${b}</div>`;
}
function selectPin(key,obj,fromList){
 selected=key;
 document.querySelectorAll('.card').forEach(c=>c.classList.toggle('active',c.dataset.id===key));
 if(map){map.flyTo([obj.lat,obj.lng],obj.precision==="exact"?16:14,{duration:.6});
  const mk=markers[key];if(mk)setTimeout(()=>mk.openPopup(),350);}
 if(!fromList){const card=document.querySelector(`.card[data-id="${key}"]`);if(card)card.scrollIntoView({behavior:'smooth',block:'center'});}
}
function updateLegend(){
 const L1=$('legend');
 if(state.view==="food"){L1.innerHTML=`<div><span class="d" style="background:${FOODCOL}"></span>Food / drink spot</div><div><span class="d" style="border:1.5px dashed #888;background:transparent"></span>Approx. area</div>`;}
 else{L1.innerHTML=`<div><span class="d" style="background:var(--club)"></span>Club night</div><div><span class="d" style="background:var(--day)"></span>Day party</div><div><span class="d" style="background:var(--street)"></span>Street party</div><div><span class="d" style="background:var(--boat)"></span>Boat party</div><div><span class="d" style="border:1.5px dashed #888;background:transparent"></span>Location TBC</div>`;}
}
function initMap(){
 map=L.map('map',{zoomControl:true,attributionControl:true}).setView([48.8646,2.3499],12.4);
 L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
 markerLayer=L.layerGroup().addTo(map);
}

/* tabs */
const PH={events:"Search events, venues, sounds…",food:"Search spots, cuisine, area…",lang:"Search phrases…"};
function setView(v){
 state.view=v;state.q="";$('search').value="";$('search').placeholder=PH[v];
 document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
 $('filterWrap').classList.toggle('hide',v!=="events");
 render();
}

buildFilters();initMap();render();
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>setView(b.dataset.view));
$('search').addEventListener('input',e=>{state.q=e.target.value.trim();render();});
$('reset').onclick=()=>{state.types.clear();state.days.clear();state.status.clear();state.q="";$('search').value="";
 document.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed','false'));render();};
const mt=$('mapToggle');
mt.onclick=()=>{document.body.classList.toggle('mapview');const on=document.body.classList.contains('mapview');mt.innerHTML=on?'☰ List':'⌖ Map';if(on&&map)setTimeout(()=>map.invalidateSize(),60);};
</script>
</body>
</html>
